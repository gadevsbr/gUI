name: Publish GitHub Package

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-github-packages.yml"
      - "package.json"
      - "package-lock.json"
      - "gui/**"
      - "scripts/**"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: |
          npm run check
          npm test

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@bragamateus"

      - name: Check version on GitHub Packages
        id: version_check
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if npm view "@bragamateus/gui@${{ steps.pkg.outputs.version }}" version --registry https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.version_check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish:github

      - name: Skip publish
        if: steps.version_check.outputs.exists == 'true'
        run: echo "Version ${{ steps.pkg.outputs.version }} is already published to GitHub Packages."
