name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist-pages/gui dist-pages/demo dist-pages/benchmark
          cp -R website/. dist-pages/
          cp -R gui/. dist-pages/gui/
          cp -R demo/. dist-pages/demo/
          cp -R benchmark/. dist-pages/benchmark/
          cp index.html dist-pages/demo/index.html
          sed -i 's#\.\./gui/index\.js#./gui/index.js#' dist-pages/main.js
          sed -i 's#\.\./gui/devtools/index\.js#./gui/devtools/index.js#' dist-pages/main.js
          sed -i 's#\./demo/styles\.css#./styles.css#' dist-pages/demo/index.html
          sed -i 's#\./demo/main\.js#./main.js#' dist-pages/demo/index.html
          sed -i 's#\./benchmark/index\.html#../benchmark/index.html#' dist-pages/demo/index.html
          touch dist-pages/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
