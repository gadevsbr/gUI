name: Bug Report
description: Report a runtime, rendering, compiler, devtools, or documentation bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please keep the report minimal and reproducible. For security vulnerabilities, do not use this form. Follow `SECURITY.md` instead.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Which version of `@bragamateus/gui` are you using?
      placeholder: "1.2.1"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Runtime / reactivity
        - Rendering / templates
        - List / control flow / portal
        - Composition API
        - Compiler
        - Devtools / inspector
        - Documentation
        - Packaging / publish
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, and bundler if relevant.
      placeholder: "Chrome 135, Windows 11, Node 22, Vite 6"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Share the smallest code sample or reproduction steps that show the problem.
      placeholder: |
        1. Create a signal...
        2. Render with html`...`
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Benchmarks, screenshots, traces, inspector output, or related issues.

